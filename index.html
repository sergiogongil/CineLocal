                            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </div>
                        <div class="fav-btn ${esFav ? 'active' : ''}" title="Favorito" onclick="toggleFavorito(event, '${peli.titulo.replace(/'/g, "\\'")}')">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                        <img src="peliculas/${peli.carpeta}/${peli.caratula}" alt="Carátula de ${peli.titulo}" loading="lazy">
                        
                        ${tieneProgreso ? `
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${porcentaje}%"></div>
                            </div>
                        ` : ''}

                        <div class="overlay">
                            <span class="year-tag">${peli.anio || 'S/A'}</span>${durTag ? `<span class="duration-tag">${durTag}</span>` : ''}
                            <div class="movie-meta">
                                <div class="stars-container">${htmlEstrellas}</div>
                            </div>
                            ${fechaTag ? `<div class="watched-date">${fechaTag}</div>` : ''}
                            ${starsHtml}
                            <h3>${peli.titulo}</h3>
                            <p>${peli.descripcion || peli.description || ''}</p>
                            <a href="detalle.html?peli=${encodeURIComponent(peli.titulo)}" class="btn-play">
                                ${tieneProgreso ? 'CONTINUAR' : 'VER AHORA'}
                            </a>
                        </div>
                    </div>
                `;
                contenedor.appendChild(wrapper);
            });

            paginaActual++;
            setTimeout(() => { 
                cargando = false; 
                if (document.documentElement.scrollHeight <= window.innerHeight) cargarMasPeliculas();
            }, 300);
        }

        function hayFiltrosActivos(busqueda) {
            return busqueda !== "" || generoActual !== "Todos" || soloFavoritos || mostrarSoloPendientes;
        }

        function actualizarEstadoBanner(busqueda) {
            const btnClear = document.getElementById('btn-clear-search');
            if (hayFiltrosActivos(busqueda)) {
                ocultarBanner();
                if (btnClear) btnClear.classList.add('visible');
            } else {
                mostrarBanner();
                if (btnClear) btnClear.classList.remove('visible');
            }
        }

        function renderizar(busqueda = "") {
            renderizarSeguirViendo();
            renderizarPodriaInteresarte();
            contenedor.innerHTML = "";
            paginaActual = 1;
            window.scrollTo(0,0);

            actualizarEstadoBanner(busqueda);

            let favoritos = getPref('mis_favoritos') || [];
            let vistos = getPref('pelis_vistas') || [];
            let descartadas = getPref('pelis_descartadas') || [];

            let filtradas = peliculas.filter(p => {
                const termino = busqueda.toLowerCase();
                const coincideBusqueda = busqueda === "" ||
                    p.titulo.toLowerCase().includes(termino) ||
                    (p.genero && p.genero.toLowerCase().includes(termino)) ||
                    (p.anio && String(p.anio).includes(termino)) ||
                    (p.descripcion && p.descripcion.toLowerCase().includes(termino));
                const coincideGenero = (generoActual === "Todos" || p.genero === generoActual);
                const coincideFav = soloFavoritos ? favoritos.includes(p.titulo) : true;
                const coincidePendiente = mostrarSoloPendientes ? !vistos.includes(p.titulo) : true;
                
                const estaDescartada = descartadas.includes(p.titulo);
                const coincideVista = vistaActual === 'home' ? !estaDescartada : estaDescartada;

                return coincideBusqueda && coincideGenero && coincideFav && coincidePendiente && coincideVista;
            });

            if (filtradas.length === 0) {
                const mensajeVacio = document.createElement('div');
                mensajeVacio.style.cssText = `grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: #666;`;
                mensajeVacio.innerHTML = `<h2>Sin resultados</h2><p>No hay películas para mostrar aquí.</p>`;
                contenedor.appendChild(mensajeVacio);
            }

            document.getElementById('contador-texto').innerHTML = `Mostrando <b>${filtradas.length}</b> de <b>${peliculas.length}</b> películas`;

            const metodoOrden = selectorOrden.value;
            if (metodoOrden === "az") filtradas.sort((a, b) => a.titulo.localeCompare(b.titulo));
            else if (metodoOrden === "puntuacion") filtradas.sort((a, b) => (b.puntuacion || 0) - (a.puntuacion || 0));
            else if (metodoOrden === "anio") filtradas.sort((a, b) => (b.anio || 0) - (a.anio || 0));

            peliculasFiltradasGlobal = filtradas;
            cargarMasPeliculas();
        }

        window.addEventListener('scroll', () => {
            btnTop.style.display = window.scrollY > 600 ? "flex" : "none";
            const scrollPos = window.innerHeight + window.pageYOffset;
            const totalHeight = document.documentElement.scrollHeight;
            if (!cargando && (scrollPos >= totalHeight - 900)) {
                if ((paginaActual - 1) * pelisPorPagina < peliculasFiltradasGlobal.length) cargarMasPeliculas();
            }
        });

        buscador.addEventListener('input', (e) => renderizar(e.target.value));

        // Botón ✕: limpia texto del buscador y resetea todos los filtros
        document.getElementById('btn-clear-search').addEventListener('click', () => {
            buscador.value = '';
            generoActual = 'Todos';
            soloFavoritos = false;
            mostrarSoloPendientes = false;
            sincronizarControlesFiltro();
            renderizar('');
        });

        selectorOrden.addEventListener('change', () => {
            const mob = document.getElementById('ordenar-mobile');
            if (mob) mob.value = selectorOrden.value;
            renderizar(buscador.value);
        });

        // =========================================
        // LÓGICA DEL BANNER CARRUSEL (NUEVA INTEGRACIÓN)
        // =========================================
        let bannerTimer;
        let slideActual = 0;
        let totalSlides = 0;
        const bannerIntervalo = 20000;
        let videoMuted = true; // Estado del sonido

        function inicializarcarruselBanner() {
            if (typeof peliculas === 'undefined' || peliculas.length === 0) return;

            // Obtener las 5 más recientes
            const recientes = [...peliculas].sort((a, b) => b.anio - a.anio).slice(0, 5);
            totalSlides = recientes.length;

            const contenedorSlides = document.getElementById('banner-slides-contenedor');
            const contenedorDots = document.getElementById('carrusel-dots');

            recientes.forEach((peli, index) => {
                const rutaBase = `peliculas/${peli.carpeta}/`;
                const urlImagen = encodeURI(`${rutaBase}${peli.caratula}`);
                const videoFile = peli.archivo || 'video.mp4';
                const urlVideo = encodeURI(`${rutaBase}${videoFile}`);
                const starsHtml = obtenerEstrellas(peli.puntuacion || 0);

                // Diapositiva con la nueva estructura y overlay dentro del slide para el correcto z-index
                const slide = document.createElement('div');
                slide.className = `banner-slide ${index === 0 ? 'active' : ''}`;
                slide.dataset.index = index;
                /* <img class="banner-bg-img" src="${urlImagen}" alt="${peli.titulo}" loading="lazy"> */
                slide.innerHTML = `
                    <video class="banner-bg-video" loop muted playsinline preload="none" data-src="${urlVideo}"></video>
                    
                    <div class="banner-overlay"></div>

                    <div class="banner-content">
                        <div class="banner-top">
                            <h2>${peli.titulo}</h2>
                        </div>
                        
                        <div class="banner-bottom">
                            <div class="banner-meta-info">
                                <span>${peli.anio}</span> • 
                                <span style="background:var(--primary); padding:2px 8px; border-radius:4px; font-size:0.8rem;">${peli.genero}</span>
                                <div class="stars-container" style="margin:0;">${starsHtml}</div>
                            </div>
                            <p class="banner-desc">${peli.descripcion}</p>
                            <a href="detalle.html?peli=${encodeURIComponent(peli.titulo)}" class="banner-btn">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="black" style="margin-right:5px;"><path d="M8 5v14l11-7z"/></svg> VER AHORA
                            </a>
                        </div>
                    </div>
                `;
                contenedorSlides.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = `carrusel-dot ${index === 0 ? 'active' : ''}`;
                dot.onclick = () => irASlideManual(index);
                contenedorDots.appendChild(dot);
            });

            gestionarVideoSlide(0);
            iniciarTimer();
        }

        const SVG_MUTED   = `<svg viewBox="0 0 24 24"><path fill="white" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
        const SVG_UNMUTED = `<svg viewBox="0 0 24 24"><path fill="white" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;

        function toggleMuteBanner() {
            videoMuted = !videoMuted;
            const btn = document.getElementById('banner-mute-btn');
            btn.innerHTML = videoMuted ? SVG_MUTED : SVG_UNMUTED;

            // Aplicar mute al video de la slide activa
            const slideActiva = document.querySelector(`.banner-slide.active`);
            if (slideActiva) {
                const video = slideActiva.querySelector('video');
                if (video) video.muted = videoMuted;
            }
        }

        function gestionarVideoSlide(index) {
            const todosVideos = document.querySelectorAll('.banner-slide video');
            todosVideos.forEach(v => { v.pause(); v.currentTime = 0; });

            const slideActiva = document.querySelector(`.banner-slide[data-index="${index}"]`);
            if (slideActiva) {
                const video = slideActiva.querySelector('video');
                
                // Asegurar que respete el estado actual del mute
                video.muted = videoMuted; 

                if (!video.src && video.dataset.src) {
                    video.src = video.dataset.src;
                    video.load();
                }

                video.onloadedmetadata = () => {
                    if (video.duration > 20) {
                        const inicioAleatorio = Math.random() * (video.duration * 0.7) + (video.duration * 0.1);
                        video.currentTime = inicioAleatorio;
                    }
                    video.play().catch(() => {});
                };

                if (video.readyState >= 1) video.onloadedmetadata();
            }
        }

        function mostrarSlide(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            slideActual = index;

            const slides = document.querySelectorAll('.banner-slide');
            slides.forEach(s => s.classList.remove('active'));
            slides[slideActual].classList.add('active');

            const dots = document.querySelectorAll('.carrusel-dot');
            dots.forEach(d => d.classList.remove('active'));
            dots[slideActual].classList.add('active');

            gestionarVideoSlide(slideActual);
        }

        function siguienteSlide() { mostrarSlide(slideActual + 1); reiniciarTimer(); }
        function anteriorSlide() { mostrarSlide(slideActual - 1); reiniciarTimer(); }
        function irASlideManual(index) { mostrarSlide(index); reiniciarTimer(); }

        function iniciarTimer() {
            if (bannerTimer) clearInterval(bannerTimer);
            bannerTimer = setInterval(siguienteSlide, bannerIntervalo);
        }

        function reiniciarTimer() {
            clearInterval(bannerTimer);
            iniciarTimer();
        }

        function ocultarBanner() {
            const banner = document.getElementById('banner-carrusel');
            if (!banner || banner.classList.contains('banner-oculto')) return;
            banner.classList.add('banner-oculto');
            clearInterval(bannerTimer);
            // Pausar todos los vídeos del banner
            banner.querySelectorAll('video').forEach(v => { v.pause(); });
        }

        function mostrarBanner() {
            const banner = document.getElementById('banner-carrusel');
            if (!banner || !banner.classList.contains('banner-oculto')) return;
            banner.classList.remove('banner-oculto');
            iniciarTimer();
            // Reanudar vídeo del slide actual
            const videoActivo = banner.querySelector('.banner-slide.active video');
            if (videoActivo) videoActivo.play().catch(() => {});
        }

        // =========================================
        // DURACIÓN · FECHA VISTA · VALORACIÓN PERSONAL
        // =========================================

        function formatDuracion(segundos) {
            if (!segundos || segundos <= 0) return null;
            const h = Math.floor(segundos / 3600);
            const m = Math.floor((segundos % 3600) / 60);
            return h > 0 ? `${h}h ${m}min` : `${m}min`;
        }

        function formatFechaRelativa(ts) {
            if (!ts) return null;
            const dias = Math.floor((Date.now() - ts) / 86400000);
            if (dias === 0) return 'Vista hoy';
            if (dias === 1) return 'Vista ayer';
            if (dias < 7)  return `Vista hace ${dias} días`;
            if (dias < 30) return `Vista hace ${Math.floor(dias / 7)} sem.`;
            if (dias < 365) {
                const m = Math.floor(dias / 30);
                return `Vista hace ${m} ${m === 1 ? 'mes' : 'meses'}`;
            }
            const a = Math.floor(dias / 365);
            return `Vista hace ${a} ${a === 1 ? 'año' : 'años'}`;
        }

        function getValoraciones()       { return getPref('valoraciones_usuario') || {}; }
        function getFechasVistas()        { return getPref('fechas_vistas') || {}; }

        function setValoracion(titulo, estrellas) {
            const vals = getValoraciones();
            if (estrellas === 0) { delete vals[titulo]; } else { vals[titulo] = estrellas; }
            setPref('valoraciones_usuario', vals);
        }

        function toggleRatingCard(event, titulo, estrellas) {
            event.stopPropagation();
            const vals = getValoraciones();
            const actual = vals[titulo] || 0;
            const nueva = (actual === estrellas) ? 0 : estrellas;
            setValoracion(titulo, nueva);
            const card = event.currentTarget.closest('.movie-card');
            if (card) {
                card.querySelectorAll('.user-rating-star').forEach((s, i) => {
                    s.classList.toggle('active', i < nueva);
                });
            }
        }

        // =========================================
        // ESTADÍSTICAS PERSONALES
        // =========================================

        function calcularEstadisticas() {
            const vistos      = getPref('pelis_vistas') || [];
            const favoritos   = getPref('mis_favoritos') || [];
            const descartadas = getPref('pelis_descartadas') || [];
            const valoraciones = getValoraciones();
            const progresos   = getPref('progreso_video') || {};
            const fechas      = getFechasVistas();

            const generosVistos = {};
            vistos.forEach(titulo => {
                const peli = peliculas.find(p => p.titulo === titulo);
                if (!peli) return;
                const gs = peli.generos || (peli.genero ? [peli.genero] : []);
                gs.forEach(g => { generosVistos[g] = (generosVistos[g] || 0) + 1; });
            });

            const vals = Object.values(valoraciones);
            const promedio = vals.length > 0
                ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1)
                : '-';

            let tiempoTotal = 0;
            vistos.forEach(titulo => {
                const d = progresos[titulo];
                if (d && d.duracion) tiempoTotal += d.duracion;
            });

            let ultimaFecha = null;
            Object.values(fechas).forEach(ts => {
                if (!ultimaFecha || ts > ultimaFecha) ultimaFecha = ts;
            });

            return { vistos: vistos.length, favoritos: favoritos.length, descartadas: descartadas.length,
                     valoraciones: vals.length, promedio, tiempoTotal, ultimaFecha, generosVistos };
        }

        function mostrarEstadisticas() {
            toggleMenu();
            const stats   = calcularEstadisticas();
            const uid     = getUsuarioActivo();
            const usuario = getUsuarios().find(u => u.id === uid);

            document.getElementById('stats-user-sub').textContent =
                usuario ? `Perfil: ${usuario.nombre}` : '';

            const h = Math.floor(stats.tiempoTotal / 3600);
            const m = Math.floor((stats.tiempoTotal % 3600) / 60);
            const tiempoStr = h > 0 ? `${h}h ${m}min` : (m > 0 ? `${m}min` : '—');

            const ultimaTxt = stats.ultimaFecha
                ? formatFechaRelativa(stats.ultimaFecha).replace('Vista ', '')
                : '—';

            document.getElementById('stats-grid').innerHTML = `
                <div class="stats-card"><div class="stats-num">${stats.vistos}</div><div class="stats-label">Vistas</div></div>
                <div class="stats-card"><div class="stats-num">${stats.favoritos}</div><div class="stats-label">Favoritas</div></div>
                <div class="stats-card"><div class="stats-num">${stats.valoraciones}</div><div class="stats-label">Valoradas</div></div>
                <div class="stats-card"><div class="stats-num">${stats.promedio}</div><div class="stats-label">Media ★</div></div>
                <div class="stats-card"><div class="stats-num">${tiempoStr}</div><div class="stats-label">En pantalla</div></div>
                <div class="stats-card"><div class="stats-num" style="font-size:1rem">${ultimaTxt}</div><div class="stats-label">Última vista</div></div>
            `;

            const sorted = Object.entries(stats.generosVistos)
                .sort((a, b) => b[1] - a[1]).slice(0, 6);
            const maxG = sorted.length > 0 ? sorted[0][1] : 1;
            document.getElementById('stats-genres').innerHTML = sorted.map(([g, n]) => `
                <div class="stats-genre-row">
                    <span class="stats-genre-name">${g}</span>
                    <div class="stats-genre-bar-wrap"><div class="stats-genre-bar-fill" style="width:${Math.round((n/maxG)*100)}%"></div></div>
                    <span class="stats-genre-count">${n}</span>
                </div>`).join('');

            document.getElementById('stats-modal').classList.add('active');
        }

        // =========================================
        // EXPORTAR / IMPORTAR PREFERENCIAS
        // =========================================

        function exportarPreferencias() {
            toggleMenu();
            const uid     = getUsuarioActivo();
            const usuario = getUsuarios().find(u => u.id === uid);
            const data = {
                version: 1,
                exportado: new Date().toISOString(),
                usuario: usuario ? { nombre: usuario.nombre } : null,
                preferencias: {
                    mis_favoritos:       getPref('mis_favoritos') || [],
                    pelis_vistas:        getPref('pelis_vistas') || [],
                    pelis_descartadas:   getPref('pelis_descartadas') || [],
                    valoraciones_usuario: getValoraciones(),
                    fechas_vistas:       getFechasVistas()
                }
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `cinelocal_${usuario ? usuario.nombre.toLowerCase().replace(/\s+/g,'_') : 'datos'}_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importarPreferencias(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.preferencias) throw new Error('Formato inválido');
                    mostrarConfirm('¿Importar datos? Esto reemplazará tus preferencias actuales.', () => {
                        const p = data.preferencias;
                        if (p.mis_favoritos)        setPref('mis_favoritos', p.mis_favoritos);
                        if (p.pelis_vistas)         setPref('pelis_vistas', p.pelis_vistas);
                        if (p.pelis_descartadas)    setPref('pelis_descartadas', p.pelis_descartadas);
                        if (p.valoraciones_usuario) setPref('valoraciones_usuario', p.valoraciones_usuario);
                        if (p.fechas_vistas)        setPref('fechas_vistas', p.fechas_vistas);
                        renderizar(buscador.value);
                    });
                } catch { alert('Error al importar: el archivo no es válido.'); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // =========================================
        // NAVEGACIÓN POR TECLADO EN EL CARRUSEL
        // =========================================
        document.addEventListener('keydown', (e) => {
            // No actuar si el usuario está escribiendo en el buscador
            if (document.activeElement === buscador) return;
            if (e.key === 'ArrowLeft')  anteriorSlide();
            if (e.key === 'ArrowRight') siguienteSlide();
        });

        // =========================================
        // INICIALIZACIÓN
        // =========================================
        inicializarFiltros();
        renderizar();
        inicializarcarruselBanner();

        // Verificar usuario activo al arrancar
        (function verificarUsuario() {
            const uid      = getUsuarioActivo();
            const usuarios = getUsuarios();
            if (uid && usuarios.find(u => u.id === uid)) {
                // Usuario válido → mostrar su nombre y ocultar overlay
                actualizarMenuUsuario(uid);
                document.getElementById('user-overlay').style.display = 'none';
            } else {
                // Sin usuario → mostrar pantalla de selección
                localStorage.removeItem('cinelocal_usuario_activo');
                mostrarPantallaUsuarios();
            }
        })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log("Service Worker registrado correctamente"))
          .catch((err) => console.log("Error al registrar SW", err));
      }
    </script>
